<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Apple TV Remote</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1c1c1e;
            color: #fff;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            overflow: hidden;
        }

        /* 상단 상태 */
        #header {
            padding: 16px;
            text-align: center;
            width: 100%;
        }
        #device-name { font-size: 17px; font-weight: 600; }
        #status-text { font-size: 13px; color: #8e8e93; margin-top: 4px; }

        /* 기기 선택 화면 */
        #device-select {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 16px;
            width: 100%;
            padding: 24px;
        }
        #device-select h2 { font-size: 20px; font-weight: 600; }
        #device-list {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .device-item {
            background: #2c2c2e;
            border: none;
            color: #fff;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
        }
        .device-item:active { background: #3a3a3c; }
        .device-item .addr { font-size: 12px; color: #8e8e93; margin-top: 2px; }
        #scan-btn {
            background: #0a84ff;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        #scan-btn:active { opacity: 0.7; }
        #scan-btn:disabled { opacity: 0.4; }

        /* 리모트 화면 */
        #remote {
            display: none;
            flex-direction: column;
            align-items: center;
            flex: 1;
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }

        /* 터치패드 */
        #touchpad-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 200px;
        }
        #touchpad {
            width: 260px;
            height: 260px;
            background: #2c2c2e;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        #touchpad-center {
            width: 90px;
            height: 90px;
            background: #3a3a3c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            z-index: 2;
        }
        #touchpad-center:active { background: #4a4a4c; }
        .dir-hint {
            position: absolute;
            font-size: 22px;
            color: #636366;
            pointer-events: none;
        }
        .dir-hint.up { top: 20px; }
        .dir-hint.down { bottom: 20px; }
        .dir-hint.left { left: 20px; }
        .dir-hint.right { right: 20px; }

        /* ��향키 */
        #dpad-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        #dpad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .dpad-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .dpad-btn {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: #2c2c2e;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dpad-btn:active { background: #4a4a4c; }
        .ok-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #0a84ff;
            font-size: 18px;
            font-weight: 700;
        }
        .ok-btn:active { background: #0070e0; }

        /* 버튼 그룹 */
        #buttons {
            width: 100%;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        .remote-btn {
            background: #2c2c2e;
            border: none;
            color: #fff;
            width: 64px;
            height: 56px;
            border-radius: 14px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .remote-btn:active { background: #4a4a4c; }
        .remote-btn .label { font-size: 10px; color: #8e8e93; }
        .wide-btn { width: 144px; }

        /* 키보드 입력 */
        #keyboard-bar {
            display: none;
            width: 100%;
            padding: 8px 0;
            gap: 8px;
        }
        #keyboard-bar input {
            flex: 1;
            background: #2c2c2e;
            border: none;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }
        #keyboard-bar button {
            background: #0a84ff;
            border: none;
            color: #fff;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* 연결 해제 */
        #disconnect-btn {
            background: none;
            border: none;
            color: #ff453a;
            font-size: 13px;
            padding: 8px;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .feedback { animation: tap-feedback 0.15s ease; }
        @keyframes tap-feedback {
            0% { transform: scale(1); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<!-- 기기 선택 -->
<div id="device-select">
    <h2>Apple TV Remote</h2>
    <div id="device-list"></div>
    <button id="scan-btn" onclick="scanDevices()">기기 검색</button>
</div>

<!-- 리모트 -->
<div id="remote">
    <div id="header">
        <div id="device-name"></div>
        <div id="status-text"></div>
    </div>

    <div id="dpad-area">
        <div id="dpad">
            <div class="dpad-row">
                <button class="dpad-btn" onclick="send('up')">▲</button>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" onclick="send('left')">◀</button>
                <button class="dpad-btn ok-btn" onclick="send('select')">OK</button>
                <button class="dpad-btn" onclick="send('right')">▶</button>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" onclick="send('down')">▼</button>
            </div>
        </div>
    </div>

    <div id="buttons">
        <div class="btn-row">
            <button class="remote-btn" onclick="send('previous')">⏮<span class="label">이전</span></button>
            <button class="remote-btn" onclick="send('play_pause')">⏯<span class="label">재생</span></button>
            <button class="remote-btn" onclick="send('next')">⏭<span class="label">다음</span></button>
        </div>
        <div class="btn-row">
            <button class="remote-btn" onclick="send('menu')">☰<span class="label">메뉴</span></button>
            <button class="remote-btn" onclick="send('home')">⌂<span class="label">홈</span></button>
            <button class="remote-btn" onclick="send('volume_down')">🔉<span class="label">볼륨-</span></button>
            <button class="remote-btn" onclick="send('volume_up')">🔊<span class="label">볼륨+</span></button>
            <button class="remote-btn" onclick="sendPower()" style="color:#ff453a">⏻<span class="label">전원</span></button>
        </div>
        <div id="keyboard-bar">
            <input type="text" id="kb-input" placeholder="텍스트 입력">
            <button onclick="sendText()">전송</button>
        </div>
        <div class="btn-row">
            <button class="remote-btn wide-btn" onclick="toggleKeyboard()">⌨️<span class="label">키보드</span></button>
        </div>
        <div class="btn-row">
            <button id="disconnect-btn" onclick="disconnect()">연결 해제</button>
        </div>
    </div>
</div>

<script>
    const API = '';
    let connectedDevice = null;

    // 기기 검색
    async function scanDevices() {
        const btn = document.getElementById('scan-btn');
        btn.disabled = true;
        btn.textContent = '검색 중...';
        try {
            const res = await fetch(API + '/devices');
            const data = await res.json();
            const list = document.getElementById('device-list');
            list.innerHTML = '';
            data.devices.forEach(d => {
                const el = document.createElement('button');
                el.className = 'device-item';
                el.innerHTML = `${d.name}<div class="addr">${d.address}</div>`;
                el.onclick = () => connectDevice(d);
                list.appendChild(el);
            });
            if (data.devices.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#8e8e93;padding:20px;">기기를 찾지 못했습니다</div>';
            }
        } catch (e) {
            alert('검색 실패: ' + e.message);
        }
        btn.disabled = false;
        btn.textContent = '기기 검색';
    }

    // 연결
    async function connectDevice(device) {
        try {
            await fetch(API + `/devices/${device.id}/connect`, { method: 'POST' });
            connectedDevice = device;
            document.getElementById('device-name').textContent = device.name;
            document.getElementById('device-select').style.display = 'none';
            document.getElementById('remote').style.display = 'flex';
            refreshStatus();
        } catch (e) {
            alert('연결 실패. 페어링이 필요할 수 있습니다.');
        }
    }

    // 리모트 명령
    async function send(command) {
        try {
            await fetch(API + `/remote/${command}`, { method: 'POST' });
        } catch (e) {}
    }

    // 전원
    async function sendPower() {
        try {
            await fetch(API + '/remote/power/toggle', { method: 'POST' });
        } catch (e) {}
    }

    // 방향키 버튼 피드백
    document.querySelectorAll('.dpad-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            btn.classList.add('feedback');
            setTimeout(() => btn.classList.remove('feedback'), 150);
        });
    });

    // 키보드 (PC에서 화살표키)
    document.addEventListener('keydown', e => {
        if (!connectedDevice) return;
        if (document.activeElement.tagName === 'INPUT') return;
        const map = {
            ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
            Enter: 'select', Escape: 'menu', Backspace: 'menu',
            ' ': 'play_pause',
        };
        if (map[e.key]) {
            e.preventDefault();
            send(map[e.key]);
        }
    });

    // 키보드 입력
    function toggleKeyboard() {
        const bar = document.getElementById('keyboard-bar');
        bar.style.display = bar.style.display === 'flex' ? 'none' : 'flex';
        if (bar.style.display === 'flex') {
            document.getElementById('kb-input').focus();
        }
    }

    async function sendText() {
        const input = document.getElementById('kb-input');
        if (!input.value) return;
        try {
            await fetch(API + '/keyboard', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: input.value })
            });
            input.value = '';
        } catch (e) {}
    }

    document.getElementById('kb-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') sendText();
    });

    // 상태
    async function refreshStatus() {
        if (!connectedDevice) return;
        try {
            const res = await fetch(API + '/status');
            const data = await res.json();
            let text = '';
            if (data.title) text = data.title;
            if (data.artist) text += ' - ' + data.artist;
            if (!text && data.app) text = data.app;
            document.getElementById('status-text').textContent = text;
        } catch (e) {}
    }

    // 연결 해제
    async function disconnect() {
        if (connectedDevice) {
            try {
                await fetch(API + `/devices/${connectedDevice.id}/disconnect`, { method: 'POST' });
            } catch (e) {}
        }
        connectedDevice = null;
        document.getElementById('remote').style.display = 'none';
        document.getElementById('device-select').style.display = 'flex';
    }

    // 초기 검색
    scanDevices();
</script>
</body>
</html>
